<html>

<head>
    <title>Dice Game</title>
    <link rel="stylesheet" href="dicestyle.css">
    <button onclick="location.href='../index.html'">Return to Homepage</button>
</head>

<body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://ykfrfjtjfzthumypaxqi.supabase.co";
const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_4jG2VqKcKpGuGRqAYzNYjg_V5V-qN_W";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

    <script src="dicegame.js"></script>
    <script src="submitscore.js"></script>

    <button id="powerups-toggle" onclick="togglePowerupsMenu()" style="display: none;">Powerups</button>
    <div id="powerups-panel" style="display: none;">
        <h3>Powerups</h3>
        <p id="powerups-total-rolls"></p>
        <div id="loaded-dice-powerup" class="powerup-card" onclick="selectPowerup('loadedDice')">
            <h4>Loaded Dice</h4>
            <p>Always roll the highest possible value on the current die.</p>
            <p id="loaded-dice-status"></p>
            <p id="loaded-dice-progress"></p>
        </div>
    </div>

    <!-- display buttons that the player can click to roll the dice and set the mode -->
    <button onclick="setEasyMode()">Easy</button>
    <button onclick="setNormalMode()">Normal</button>

    <!-- display the player's roll, score and the required number for the current die -->
    <p id="mode"></p>
    <p id="roll"></p>
    <p id="score"></p>
    <p id="total"></p>
    <p id="session"></p>
    <p id="wins"></p>
    <p id="losses"></p>
    <p id="high"></p>
    <p id="powerup-activation-message"></p>
    <!--unique roll button id-->
    <button id="roll-button" onclick="rollDice()">Roll</button>
    <form id="submit-form">
        <label for="playerName">Enter your name:</label>
        <input type="text" id="playerName" name="name">
        <input type="button" value="Submit" onclick="submitScore(score);">
    </form>

    <div id="leaderboard"></div>
    <script src="scorefetch.js"></script>
</body>

</html>
